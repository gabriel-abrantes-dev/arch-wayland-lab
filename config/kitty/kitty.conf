# Kitty enxuto para estudo Wayland
# O kitty.conf do pacote tem milhares de linhas comentadas.
# Aqui ficam só decisões úteis para o lab.
# Tema: se existir current-theme.conf no destino, descomente o include.

# include current-theme.conf

font_family      JetBrainsMono Nerd Font
font_size        11.0

# Preferir Wayland nativo (evita XWayland no terminal)
linux_display_server wayland

background_opacity 0.95
confirm_os_window_close 0

# Scrollback generoso para logs/pacman
scrollback_lines 10000

map ctrl+shift+equal change_font_size all +1.0
map ctrl+shift+minus change_font_size all -1.0
map ctrl+shift+backspace change_font_size all 0
