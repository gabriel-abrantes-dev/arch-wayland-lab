# Autostart da sessão gráfica
# Roda uma vez quando o Hyprland sobe (não a cada reload de binds).
# Prefira isto para UI; daemons (PipeWire) ficam no systemd --user.

exec-once = waybar & hyprpaper & firefox
exec-once = blueman-applet

